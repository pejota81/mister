name: Update READMEs on Changelog Change

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme-main
  cancel-in-progress: false

jobs:
  update-readme:
    # Skip commits made by the bot (e.g. this workflow's own README commit)
    # to prevent an infinite trigger loop.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update README files from changelog
        run: python .github/scripts/update-readme.py

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md README.pt-BR.md README.es.md

          if git diff --staged --quiet; then
            echo "No README changes to commit."
          else
            git commit -m "chore: update READMEs from changelog"
            git push
          fi
