on:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: publish-changelog-main
  cancel-in-progress: false

jobs:
  publish:
    # For merge commits created by "Create a merge commit"
    if: startsWith(github.event.head_commit.message, 'Merge pull request ')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Create installation token (GitHub App)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PJFOOT_MIRROR_APP_ID }}
          private-key: ${{ secrets.PJFOOT_MIRROR_APP_PRIVATE_KEY }}
          owner: pejota81
          repositories: mister

      - name: Checkout destination repo
        uses: actions/checkout@v4
        with:
          repository: pejota81/DEST_REPO
          token: ${{ steps.app-token.outputs.token }}
          path: dest
          fetch-depth: 1

      - name: Sync changelog folder to destination root/changelog
        run: |
          set -euo pipefail
          rsync -a --delete changelog/ dest/changelog/

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          cd dest

          if git diff --quiet; then
            echo "No changelog changes to publish."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Publish changelog from PJfoot-feedback @ $GITHUB_SHA"
          git push
